name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip python3-dev build-essential \
            autoconf automake libtool libffi-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libssl-dev libsqlite3-dev \
            openjdk-17-jdk-headless zip unzip git \
            libltdl-dev cmake

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache SDK & NDK (skip re-download)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-*
            .buildozer/android/packages
          key: ${{ runner.os }}-buildozer-sdk-v1-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-sdk-v1-

      - name: Clean build outputs only
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a/ 2>/dev/null || true
          rm -rf .buildozer/android/platform/python-for-android/ 2>/dev/null || true
          rm -rf .buildozer/android/app/ 2>/dev/null || true

      - name: Build APK
        run: |
          buildozer android debug
        timeout-minutes: 45

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soloist-carbin-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload APK to Aliyun OSS
        if: success()
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          pip install oss2
          python3 - <<'PYEOF'
          import oss2, os, glob

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-guangzhou.aliyuncs.com', 'soloist-apk')

          apk_files = glob.glob('bin/*.apk')
          if not apk_files:
              print('No APK found!')
              exit(1)

          apk_file = apk_files[0]

          # 阿里云禁止用 OSS 默认域名分发 .apk (ApkDownloadForbidden),
          # 故上传为 .zip 后缀绕过 (APK 本质是 zip, adb install 不看后缀)。
          # 固定覆盖 latest.zip，URL 不变。
          bucket.put_object_from_file('apk/latest.zip', apk_file)

          url = f'https://soloist-apk.oss-cn-guangzhou.aliyuncs.com/apk/latest.zip'
          print(f'上传成功！固定下载链接: {url}')

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('## APK 下载（国内直链）\n\n')
              f.write(f'**固定链接（每次构建自动覆盖，下载后即可 adb install）:**\n\n')
              f.write(f'```\n{url}\n```\n')
          PYEOF
